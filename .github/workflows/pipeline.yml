name: Testing stuff

on:
  push:
    branches:
      - main

jobs:
  a_test_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: commits
        env:
          COMMITS: ${{ toJson(github.event.commits) }}
        run: echo "$COMMITS"
      - name: commit messages
        env:
          COMMIT_MESSAGE: ${{ join(github.event.commits.*.message, '') }}
        run: echo "$COMMIT_MESSAGE"
      - name: Check commit message
        env:
          CONTAINS_SKIP: ${{ contains(join(github.event.commits.*.message, ''), '#skip') }}
        run: echo "$CONTAINS_SKIP"
      - name: check secret present
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            echo "WEBHOOK IS EMPTY"
          else
            echo "webhook is set (length hidden)"
          fi
      